name: Main/Release CI/CD

on:
  push:
    branches:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONFIGURATION: Release
  SOLUTION_PATH: Incursa.Generators.slnx

jobs:
  smoke:
    name: Smoke Lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run smoke lane
        shell: pwsh
        run: ./scripts/run-smoke-tests.ps1 -Configuration ${{ env.CONFIGURATION }} -Solution ${{ env.SOLUTION_PATH }}

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: TestResults/smoke/

  blocking:
    name: Blocking Lane
    needs: smoke
    if: needs.smoke.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run blocking lane
        shell: pwsh
        run: ./scripts/run-blocking-tests.ps1 -Configuration ${{ env.CONFIGURATION }} -Solution ${{ env.SOLUTION_PATH }}

      - name: Upload blocking artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blocking-test-results
          path: TestResults/blocking/

  observational:
    name: Observational Lane
    needs: smoke
    if: needs.smoke.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run observational lane
        shell: pwsh
        run: ./scripts/run-observational-tests.ps1 -Configuration ${{ env.CONFIGURATION }} -Solution ${{ env.SOLUTION_PATH }}

      - name: Upload observational artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observational-test-results
          path: TestResults/observational/

  advisory:
    name: Advisory Quality Lane
    needs: smoke
    if: needs.smoke.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run advisory lane
        shell: pwsh
        run: ./scripts/run-advisory-quality-tests.ps1 -Configuration ${{ env.CONFIGURATION }} -Solution ${{ env.SOLUTION_PATH }}

      - name: Build quality evidence bundle
        if: always()
        shell: pwsh
        run: ./scripts/run-quality-evidence.ps1 -ResultsDirectory TestResults/advisory -OutputDirectory artifacts/quality/testing

      - name: Upload advisory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advisory-test-results
          path: TestResults/advisory/

      - name: Upload quality evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advisory-quality-evidence
          path: artifacts/quality/testing/

  package:
    name: Package
    needs: blocking
    if: needs.blocking.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.git_version.outputs.semVer }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Determine version
        id: git_version
        shell: pwsh
        run: |
          $now = [System.DateTime]::UtcNow
          $revision = $now.Hour * 60 + $now.Minute
          $baseVersion = "$($now.Year).$($now.Month).$($now.Day).$revision"
          $version = $baseVersion

          try {
            $branchName = (git rev-parse --abbrev-ref HEAD).Trim()
            $mainBranches = @('main', 'master')

            if ($branchName -and ($mainBranches -notcontains $branchName.ToLowerInvariant())) {
              $safeBranch = $branchName -replace '[^A-Za-z0-9-]', '-'
              $version = "$baseVersion-$safeBranch"
            }
          }
          catch {
            Write-Warning 'Could not determine git branch. Using base version.'
          }

          "semVer=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution for packaging
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore -p:GeneratePackageOnBuild=false

      - name: Pack NuGet packages
        shell: pwsh
        run: |
          dotnet pack src/Incursa.Generators/Incursa.Generators.csproj --configuration ${{ env.CONFIGURATION }} --no-build --no-restore --output ./nupkgs -p:PackageVersion=${{ steps.git_version.outputs.semVer }}
          dotnet pack src/Incursa.Generators.Tool/Incursa.Generators.Tool.csproj --configuration ${{ env.CONFIGURATION }} --no-build --no-restore --output ./nupkgs -p:PackageVersion=${{ steps.git_version.outputs.semVer }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./nupkgs/*.nupkg

  publish-nuget-org:
    name: Publish NuGet.org
    needs: package
    if: needs.package.result == 'success' && !contains(needs.package.outputs.version, '-')
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: out

      - name: Skip publish when key is missing
        if: ${{ env.NUGET_API_KEY == '' }}
        run: echo "NUGET_API_KEY is not set; skipping NuGet publish."

      - name: Push to nuget.org
        if: ${{ env.NUGET_API_KEY != '' }}
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ env.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
